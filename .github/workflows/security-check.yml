name: security-check

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: No runtime or cache files
        run: |
          if find . \( \
            -name '__pycache__' -o \
            -name '*.pyc' -o \
            -name '*.pyo' -o \
            -name '.env' -o \
            -name 'local_store.json' -o \
            -path './storage/*' -o \
            -path './.ipynb_checkpoints/*' \
          \) | grep .; then
            echo 'Runtime/cache/sensitive local files must not be committed.'
            exit 1
          fi
      - name: Compile project code
        run: python -m compileall -q mad_colab_pkg training
      - name: Secret pattern scan in executable files
        run: |
          if grep -RInE 'https://[a-zA-Z0-9-]+\.supabase\.co|eyJ[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN' mad_colab_pkg training notebooks sql 2>/dev/null; then
            echo 'Potential secret found in code/notebooks/sql.'
            exit 1
          fi
      - name: Notebook outputs must be stripped
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          failed = False
          for path in Path('notebooks').glob('*.ipynb'):
              nb = json.loads(path.read_text(encoding='utf-8'))
              outputs = sum(len(cell.get('outputs', [])) for cell in nb.get('cells', []))
              if outputs:
                  print(f'{path}: has {outputs} outputs')
                  failed = True
          raise SystemExit(1 if failed else 0)
          PY
